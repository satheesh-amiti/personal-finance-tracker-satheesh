name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "personal-finance-tracker-frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "personal-finance-tracker-frontend/**"
      - ".github/workflows/azure-static-web-apps.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_POND_020D46F00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: personal-finance-tracker-frontend
          api_location: ""
          output_location: dist
          app_build_command: npm run build
          config_file_location: personal-finance-tracker-frontend

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Frontend Pull Request Preview
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_POND_020D46F00 }}
          action: close
