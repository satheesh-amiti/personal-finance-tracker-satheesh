name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "personal-finance-tracker-backend/**"
      - ".github/workflows/deploy-backend-app-service.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore PersonalFinance.sln
        working-directory: ./personal-finance-tracker-backend

      - name: Build
        run: dotnet build src/PersonalFinance.Api/PersonalFinance.Api.csproj --configuration Release --no-restore
        working-directory: ./personal-finance-tracker-backend

      - name: Publish
        run: dotnet publish src/PersonalFinance.Api/PersonalFinance.Api.csproj --configuration Release --no-build --output ./publish
        working-directory: ./personal-finance-tracker-backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: personal-finance-tracker-backend/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: track-my-money-api
          slot-name: Production
          package: ./publish
